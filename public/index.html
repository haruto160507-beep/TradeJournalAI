<!DOCTYPE html>
<html lang="ja">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>投資利益カレンダー</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="container">

<header>

<h1>📈 投資利益カレンダー</h1>

<p id="todayDate"></p>

</header>

<section class="summary">

<div class="card">
<h2>今日</h2>
<p id="today">0 円</p>
</div>

<div class="card">
<h2>今週</h2>
<p id="week">0 円</p>
</div>

<div class="card">
<h2>今月</h2>
<p id="month">0 円</p>
</div>

<div class="card">
<h2>累計</h2>
<p id="total">0 円</p>
</div>

</section>

<section class="stats">

<div class="card">
<h2>勝率</h2>
<p id="winRate">0%</p>
</div>

<div class="card">
<h2>PF</h2>
<p id="pf">0.00</p>
</div>

<div class="card">
<h2>勝ち</h2>
<p id="winCount">0</p>
</div>

<div class="card">
<h2>負け</h2>
<p id="loseCount">0</p>
</div>

</section>

<section>

<h2>利益カレンダー</h2>

<div id="calendarHeader"></div>

<div id="calendar"></div>

</section>

<section>

<h2>日別利益</h2>

<canvas id="profitChart"></canvas>

</section>

<section>

<h2>銘柄別利益</h2>

<table>

<thead>

<tr>

<th>銘柄</th>

<th>利益</th>

</tr>

</thead>

<tbody id="symbolTable">

</tbody>

</table>

</section>

<section>

<h2>取引履歴</h2>

<table>

<thead>

<tr>

<th>日時</th>

<th>銘柄</th>

<th>ロット</th>

<th>利益</th>

</tr>

</thead>

<tbody id="history">

</tbody>

</table>

</section>

</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script src="script.js"></script>

</body>

</html>
